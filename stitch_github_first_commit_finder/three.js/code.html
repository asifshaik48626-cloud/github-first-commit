<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_6 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_6" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_6');
  const devicePixelRatio = window.devicePixelRatio || 1;
  // Three.js 3D Swinging Glass Octocat
// High-fidelity setup for CommitGenius

let scene, camera, renderer, octocatGroup;
let time = 0;

function init() {
    scene = new THREE.Scene();
    
    const width = container.clientWidth || window.innerWidth;
    const height = container.clientHeight || window.innerHeight;
    
    camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
    camera.position.z = 5;

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(width, height);
    container.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const pointLight1 = new THREE.PointLight(0x3b82f6, 2, 20);
    pointLight1.position.set(5, 5, 5);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0x8b5cf6, 2, 20);
    pointLight2.position.set(-5, -5, 5);
    scene.add(pointLight2);

    // Create Octocat Group (Simplified Glass Model)
    octocatGroup = new THREE.Group();
    
    const glassMaterial = new THREE.MeshPhongMaterial({
        color: 0xffffff,
        specular: 0xffffff,
        shininess: 100,
        transparent: true,
        opacity: 0.4,
        side: THREE.DoubleSide
    });

    // Head
    const headGeom = new THREE.SphereGeometry(1, 32, 32);
    const head = new THREE.Mesh(headGeom, glassMaterial);
    octocatGroup.add(head);

    // Ears
    const earGeom = new THREE.ConeGeometry(0.3, 0.7, 32);
    const earL = new THREE.Mesh(earGeom, glassMaterial);
    earL.position.set(-0.7, 0.9, 0);
    earL.rotation.z = 0.5;
    octocatGroup.add(earL);

    const earR = new THREE.Mesh(earGeom, glassMaterial);
    earR.position.set(0.7, 0.9, 0);
    earR.rotation.z = -0.5;
    octocatGroup.add(earR);

    // Eyes (Glow)
    const eyeGeom = new THREE.SphereGeometry(0.15, 16, 16);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x3b82f6 });
    const eyeL = new THREE.Mesh(eyeGeom, eyeMat);
    eyeL.position.set(-0.35, 0.1, 0.85);
    octocatGroup.add(eyeL);

    const eyeR = new THREE.Mesh(eyeGeom, eyeMat);
    eyeR.position.set(0.35, 0.1, 0.85);
    octocatGroup.add(eyeR);

    // Tentacles (Simulated)
    for(let i=0; i<5; i++) {
        const tentacleGeom = new THREE.CylinderGeometry(0.1, 0.05, 1.2, 8);
        const tentacle = new THREE.Mesh(tentacleGeom, glassMaterial);
        tentacle.position.set(Math.sin(i * 1.2) * 0.5, -1.2, Math.cos(i * 1.2) * 0.5);
        tentacle.rotation.x = 0.2;
        octocatGroup.add(tentacle);
    }

    scene.add(octocatGroup);

    window.addEventListener('resize', onWindowResize, false);
    animate();
}

function onWindowResize() {
    const width = container.clientWidth || window.innerWidth;
    const height = container.clientHeight || window.innerHeight;
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height);
}

function animate() {
    requestAnimationFrame(animate);
    time += 0.01;

    // "Swing" motion
    if (octocatGroup) {
        octocatGroup.rotation.y = Math.sin(time) * 0.2;
        octocatGroup.rotation.z = Math.cos(time * 0.5) * 0.1;
        octocatGroup.position.y = Math.sin(time * 2) * 0.2;
    }

    renderer.render(scene, camera);
}

init();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_6 -->
</body>
</html>
